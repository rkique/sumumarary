name: Publish webapp index.html to website repo

on:
  push:
    branches: [ main ]
    paths-ignore:
      - README.md
      - docs/**
jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Checkout website repo
        uses: actions/checkout@v4
        with:
          repository: rkique/next-blog
          token: ${{ secrets.WEBSITE_REPO_TOKEN }}
          path: website
      
      - name: Copy app repo into website repo
        shell: bash
        run: |
          mkdir -p website/public/summary
          rsync -av --delete-after \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='.next' \
            ./ website/public/summary/ || rc=$?
          if [ "${rc:-0}" -ne 0 ] && [ "${rc:-0}" -ne 24 ]; then exit "$rc"; fi
          
      - name: Commit and push if changed
        run: |
          cd website
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
          # Stage the entire synced directory
          git add public/summary
      
          # Exit cleanly if nothing changed
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
      
          git commit -m "Sync app repo to /summary (${GITHUB_SHA::7})"
          git push
                
